workflow_id: poc_doc_generation
version: "3.0"
description: "POC 아키텍처 분석 + Dapr 조사 (병렬) → Markdown 설계 문서 생성"

input_schema:
  project_root: string
  description: string

states:
  - id: START
    type: start

  # ── Phase 1: 병렬 분석 (소스코드 + Dapr 기술 조사) ──
  - id: RESEARCH_PHASE
    type: parallel
    description: "소스코드 분석과 Dapr 기술 조사를 병렬로 수행"
    branches:
      - id: ANALYZE_SOURCE
        task: ai_task
        timeout_sec: 1200
        description: "POC 프로젝트 소스코드 전수 분석 + Dapr 사용 현황 + 레이어드 아키텍처"
        instruction: >
          You are a senior software architect analyzing a Python project.

          The file tools (read_file, glob, grep, list_directory) all operate relative to
          the project root. Use relative paths like "orchestrator/main.py".


          ## Phase 1: Discover file inventory (use glob, NOT per-file read)

          Run glob("**/*.py") and glob("**/*.yaml") and glob("**/*.html") to get file counts.
          Run list_directory(".") and list_directory() for each service dir to understand layout.

          Do NOT read every file individually. Use bulk grep instead.


          ## Phase 2: Bulk extraction via grep (3-5 calls replaces 30+ read_file)

          Extract key information across ALL files using targeted grep calls:

          Call 1 — grep("^class |^def |^async def", path=".") 
          Gets ALL class and function signatures in the entire project in one call.

          Call 2 — grep("os\\.getenv", path=".")
          Gets ALL environment variable reads. Note which are at module level (import time)
          vs inside function defs (request time).

          Call 3 — grep("^from |^import ", path="orchestrator")
          With the results from call 1, you'll know which files have what classes.
          Do a similar grep for each service dir to understand cross-module dependencies.

          Call 4 — grep("(@register_tool|@tool|@app\\.(get|post|put|delete)|@router)", path=".")
          Gets ALL decorator patterns in one call — routes, tools, registrations.


          ## Phase 3: Batch read key files via read_files (3 calls instead of 12+)

          Based on the bulk extraction above, use read_files to batch-read files:

          Call A — read_files for orchestrator (all at once):
          "orchestrator/main.py, orchestrator/engine.py, orchestrator/dapr_client.py, orchestrator/payload_builder.py, orchestrator/instance.py"

          Call B — read_files for agent_worker + shared (all at once):
          "agent_worker/main.py, agent_worker/universal/handler.py, agent_worker/universal/langgraph_agent.py, agent_worker/universal/tools.py, shared/models.py, shared/workflow_repository.py"

          Call C — read_files for shared/orm + loader + db + dapr_workflow (all at once):
          "shared/orm_models.py, shared/workflow_loader.py, shared/db.py, dapr_workflow/main.py"

          For each file read via read_files, focus on:
          - Class/function bodies (you already have signatures from phase 2)
          - Key code patterns and logic
          - API route handlers (FastAPI decorators)
          - Design pattern implementations

          IMPORTANT: USE read_files (batch) wherever possible. Fall back to read_file (single)
          only when you need to read a single file that doesn't fit into a group of 6.


          ## Phase 4: Analyze Dapr usage (grep, not per-file scan)

          Use targeted grep calls instead of scanning each file:

          Call once: grep("dapr|Dapr|when_all|pubsub|sidecar|ondelete", path=".")
          This single grep finds ALL Dapr-related patterns across the entire project.

          For each finding, note: file, line, usage (active/optional/config)

          Also grep for these specific env vars in one call:
          grep("DAPR_WF_SERVICE_URL|DAPR_HTTP_PORT|DAPR_PUBSUB_NAME|AGENT_TASK_TOPIC|AGENT_RESULT_TOPIC", path=".")


          ## Phase 5: Read config and templates

          - pyproject.toml (dependencies — 1 read_file)
          - biz_workflows/*.yaml (workflow definitions — use grep or read per file)


          ## Phase 6: Identify the layered architecture

          Map the codebase to a 4-layer architecture:

          L1 — Orchestration Layer: Workflow definition loading → state machine iteration → transition evaluation
              Files: orchestrator/engine.py (BizFlowEngine), payload_builder.py (PayloadBuilder), instance.py (ClaimInstance)
              Responsibility: reads workflow def, iterates states, evaluates transition conditions, assembles payloads

          L2 — Workflow Execution Layer: Task dispatch → Dapr Workflow or Direct HTTP
              Files: orchestrator/dapr_client.py (DirectAgentClient, DaprWorkflowClient), dapr_workflow/main.py
              Responsibility: dispatches tasks to worker, handles parallel branch execution
              Mode switch: DAPR_WF_SERVICE_URL env var controls DirectAgentClient (standalone) vs DaprWorkflowClient (Dapr)

          L3 — Communication Layer: HTTP endpoints, Dapr pub/sub topics
              Files: agent_worker/main.py (/dapr/subscribe, /agent/task endpoint)
              Responsibility: receives tasks, publishes results, Dapr subscription declaration

          L4 — Universal Worker Layer: LLM + tool execution
              Files: agent_worker/universal/handler.py, langgraph_agent.py, tools.py
              Responsibility: LangGraph ReAct Agent executes AI tasks with tool-calling loop

          For each layer document: what code implements it, what it depends on,
          how it connects to adjacent layers, what env vars control its behavior.


          ## OUTPUT: output_schema 필드에 정의된 JSON 구조를 정확히 따라 반환하세요.

        inputs: [_input]
        tools: [read_file, read_files, glob, grep, list_directory]
        output_schema:
          type: object
          properties:
            total_files: {type: object}
            services: {type: object}
            dapr_usage: {type: object}
            layered_architecture: {type: object}
            architecture: {type: object}
            dependencies: {type: object}
            operational_notes: {type: object}

      - id: RESEARCH_DAPR
        task: ai_task
        timeout_sec: 1800
        description: "Dapr 기술 개념 공식 문서 조사"
        instruction: >
          You are a Dapr technology specialist researching Dapr for an AI Agent orchestration POC.

          ## IMPORTANT: Dapr Documentation URL Patterns

          The Dapr docs site uses these EXACT URL patterns. URLs that deviate from these will return 404.
          Use ONLY these verified URLs for web_fetch:

          - Overview: https://docs.dapr.io/concepts/
          - Dapr overview: https://docs.dapr.io/concepts/overview/
          - Workflow docs: https://docs.dapr.io/developing-applications/building-blocks/workflow/
          - Workflow overview: https://docs.dapr.io/developing-applications/building-blocks/workflow/workflow-overview/
          - How to author: https://docs.dapr.io/developing-applications/building-blocks/workflow/howto-author-workflow/
          - How to manage: https://docs.dapr.io/developing-applications/building-blocks/workflow/howto-manage-workflow/
          - Workflow patterns: https://docs.dapr.io/developing-applications/building-blocks/workflow/workflow-patterns/
          - Pub/sub docs: https://docs.dapr.io/developing-applications/building-blocks/pubsub/
          - How to pub/sub: https://docs.dapr.io/developing-applications/building-blocks/pubsub/howto-publish-subscribe/

          ## 프로젝트 맥락

          이 POC는 AI Agent workflow orchestration 플랫폼입니다. Dapr은 다음과 같이 사용됩니다:
          - Dapr Workflow SDK: when_all로 병렬 브랜치 실행
          - Dapr pub/sub: agent_worker에 task 전달 및 결과 수신
          - Dapr sidecar HTTP API: workflow 실행/상태 조회
          - Dapr Workflow component: durable execution
          - 현재는 standalone 모드(Dapr 없음)가 기본이나, DAPR_WF_SERVICE_URL env var 설정 시 Dapr 모드로 전환

          ## Phase 1: Dapr 기본 개념 조사

          Dapr가 무엇인지, 핵심 빌딩 블록을 개괄적으로 조사:

          web_search("Dapr distributed application runtime building blocks overview")

          찾을 내용:
          - Dapr이 무엇인지 (분산 애플리케이션 런타임, sidecar 패턴)
          - 주요 building blocks 목록 (service invocation, state management, pub/sub, actors, workflows, etc.)
          - sidecar 아키텍처의 장점 (애플리케이션 코드와 분리, 언어 중립적 HTTP/gRPC API)
          - Dapr 공식 문서의 "Concepts"와 "Getting Started" 섹션 키 내용

          ## Phase 2: 핵심 주제 심층 조사 (3 topics)

          각 주제당 정확히 1번의 web_search + 최대 1번의 web_fetch로 제한.
          한 topic에 너무 많은 시간을 쓰지 마세요.

          ---

          Topic 1: Dapr Workflow SDK
          검색어: "Dapr Workflow SDK when_all parallel execution task orchestration"
          확인할 내용:
          - when_all() API로 병렬 브랜치 실행
          - 워크플로우 등록(register_workflow) 및 실행 엔드포인트
          - 워크플로우 상태 polling 방식
          - POC 관련: DirectAgentClient(순차) vs DaprWorkflowClient(when_all 병렬)

          ---

          Topic 2: Dapr pub/sub
          검색어: "Dapr pub/sub programmatic subscription HTTP API CloudEvents"
          확인할 내용:
          - programmatic subscription (/dapr/subscribe)
          - CloudEvents 메시지 포맷
          - topic 발행 (POST /v1.0/publish/{pubsub}/{topic})
          - POC 관련: agent_worker의 /dapr/subscribe로 agent.tasks 구독, /agent/task 수신

          ---

          Topic 3: Dapr sidecar + component configuration
          검색어: "Dapr sidecar HTTP API workflow component YAML"
          확인할 내용:
          - sidecar 패턴 (애플리케이션 컨테이너와 나란히 실행)
          - 기본 포트: HTTP 3500, gRPC 50001
          - Dapr component YAML 구조 (apiVersion, kind, metadata, spec)
          - pub/sub + workflow component YAML 예시
          - POC 관련: docker-compose에서 Dapr sidecar와 함께 실행하는 방법

          ---

          Bonus: Dapr Actors (간략히만 검색, 시간 남으면)
          검색어: "Dapr virtual actor pattern"
          POC 관련: 현재 미사용 but AI Agent를 actor로 모델링할 경우 상태 관리 및 수명 주기 관리 가능성

          ## OUTPUT: output_schema 필드에 정의된 JSON 구조를 정확히 따라 반환하세요.

        inputs: [_input]
        tools: [web_search, web_fetch]
        output_schema:
          type: object
          properties:
            overview: {type: object}
            topics: {type: array}
            deployment: {type: object}
            execution_mode_comparison: {type: object}
            summary: {type: string}
            all_references: {type: array}

  # ── Phase 2: 문서 생성 ──
  - id: GENERATE_CONTENT
    type: task
    task: ai_task
    timeout_sec: 300
    description: "분석 결과 취합 → Markdown 설계 문서 작성"
    instruction: >
      당신은 시니어 기술 문서 작성자입니다. comprehensive architecture document를
      한국어로 작성해 주세요. 독자는 시니어 엔지니어와 아키텍트입니다.

      ## 입력 데이터 구조

      You have two structured inputs in your payload (referenced as payload["ANALYZE_SOURCE"] and payload["RESEARCH_DAPR"]):

      ANALYZE_SOURCE:
        services: {orchestrator, agent_worker, shared, dapr_workflow}
          각 서비스별: purpose, key_classes[], key_functions[], api_routes[], env_vars[], design_patterns[]
        dapr_usage: {summary, mode_comparison {standalone, dapr}, findings[]}
        layered_architecture: {layers[] — L1~L4 with components, responsibility, depends_on, env_vars}
        architecture: {summary, key_patterns[] with code_snippet, significance, importance, security_boundary}
        dependencies: {framework[], database, llm, external_services[]}
        operational_notes: {env_var_timing, port_conflicts, shell_quoting}

      RESEARCH_DAPR:
        overview: {what_is_dapr, building_blocks[], sidecar_architecture}
        topics[]: {name, official_description, api_details, poc_integration, best_practices, pitfalls, references}
        deployment: {dapr_components[] with yaml_example, ports, initialization}
        execution_mode_comparison: {standalone: {trigger, architecture, pros, cons}, dapr: {...}}
        summary, all_references[]

      ## 작성 프로토콜

      1. 먼저 payload["ANALYZE_SOURCE"]와 payload["RESEARCH_DAPR"] 전체를 읽고 각 섹션에 필요한 데이터 식별
      2. 각 섹션을 순서대로 작성 (1 → 9)
      3. 각 섹션 구성: 도입문단(2-3문장) → 기술 상세(불릿 포인트) → 코드 블록(해당 시) → 표(데이터 비교 시)
      4. 코드 블록은 payload["ANALYZE_SOURCE"].architecture.key_patterns[].code_snippet의 EXACT 코드 사용
      5. RESEARCH_DAPR 데이터는 "Dapr 공식 문서에 따르면..." 식으로 인용 출처 표시

      ## 문서 섹션 (상세 가이드)

      ### 1. Executive Summary
      - payload["_input"].description 활용 (POC 목적과 범위)
      - 핵심 아키텍처 결정사항 요약: State Machine 엔진, LangGraph ReAct Agent, Tool Registration Pipeline, Dapr 선택적 통합
      - 기술 스택: payload["ANALYZE_SOURCE"].dependencies.framework[], database, llm
      - 실행 모드: standalone(기본) + Dapr(선택) 이중 모드

      ### 2. Layered System Architecture
      - payload["ANALYZE_SOURCE"].layered_architecture.layers[]의 4개 레이어를 표로 요약
      - 레이어별 상세 설명:
        L1 — Orchestration Layer: BizFlowEngine, PayloadBuilder, TransitionEvaluator
        L2 — Workflow Execution Layer: DirectAgentClient / DaprWorkflowClient, env var로 모드 전환
        L3 — Communication Layer: /agent/task endpoint, Dapr pub/sub subscription
        L4 — Universal Worker Layer: LangGraph ReAct Agent, 7개 tool, tool whitelist
      - 레이어 간 데이터 흐름 (data_flow_across_layers 인용)

      ### 3. Dapr Integration
      - RESEARCH_DAPR.overview.what_is_dapr로 Dapr 개념 소개 (sidecar 아키텍처, building blocks)
      - RESEARCH_DAPR.topics[]에서 POC 관련 2개 집중 설명:
        Dapr Workflow SDK: official_description 인용 → poc_integration 매핑 → api_details
        Dapr pub/sub: same format
      - RESEARCH_DAPR.topics[]에서 Dapr Actors 개념 소개 (현재 미사용 but 확장 가능성)
      - 실행 모드 비교 표:
        | 항목 | Standalone | Dapr |
        | 트리거 | DAPR_WF_SERVICE_URL 미설정 | DAPR_WF_SERVICE_URL 설정 |
        | 병렬 처리 | 순차 실행 | when_all 진정한 병렬 |
        | 인프라 | 없음 | Docker + Dapr sidecar |
      - deployment.dapr_components[].yaml_example 코드 블록 (```yaml)

      ### 4. Component Details
      payload["ANALYZE_SOURCE"].services의 4개 서비스 각각 서브섹션 (#### 4.1 ~ 4.4):

      #### 4.1 Orchestrator
      - 목적, 진입점
      - key_classes 표: name | signature | purpose (importance: high만 강조)
      - api_routes 표: method | path | handler | purpose
      - env_vars 표: name | default | read_at | effect
      - design_patterns 불릿

      #### 4.2 Agent Worker (동일 형식)
      #### 4.3 Shared (동일 형식 — 데이터 모델 중심)
      #### 4.4 Dapr Workflow (동일 형식)

      ### 5. Data Flow
      - 전체 경로 추적: "API call (/api/instances/start) → engine.run() → PayloadBuilder.build() → dapr.execute_task() → agent_worker /agent/task → LangGraph run_agent() → result 저장 → DB"
      - 각 단계에서 데이터 변환 설명 (inputs 배열 → _input + 이전 step 결과 병합)
      - engine.py의 state machine loop: MAX_STEPS=50 안전장치, transition condition 평가
      - payload["ANALYZE_SOURCE"].architecture.key_patterns에서 State Machine 코드 스니펫 포함

      ### 6. Parallel Execution Model
      - RESEARCH_PHASE parallel state: 2개 브랜치(ANALYZE_SOURCE + RESEARCH_DAPR) 병렬
      - transition condition 패턴: `result.BRANCH_ID.status == 'OK' and result.BRANCH2_ID.status == 'OK'`
      - standalone: DirectAgentClient.execute_parallel이 순차 루프로 branch 실행
      - Dapr: dapr_workflow 서비스가 when_all로 진정한 병렬 fan-out/fan-in
      - payload assembly: GENERATE_CONTENT가 inputs: [ANALYZE_SOURCE, RESEARCH_DAPR]로 결과 수신

      ### 7. Universal AI Worker
      - LangGraph create_react_agent (```python 코드 블록: code_snippet 그대로)
      - tool registration 4단계 파이프라인 (```python):
        1. @register_tool 데코레이터 (tools.py)
        2. TOOL_DEFINITIONS 리스트에 추가
        3. @tool wrapper (langgraph_agent.py)
        4. _ALL_LC_TOOLS 리스트에 추가
      - tool whitelist: 각 workflow step의 tools: [...] 배열로 LLM 노출 제어
      - mock fallback: OPENAI_API_KEY 없으면 _TASK_HINTS_MOCK 반환
      - FS_BASE_PATH: file tools의 보안 경계

      ### 8. Deployment Architecture
      - 포트 할당표:
        | 서비스 | Standalone 포트 | Dapr 포트 | 비고 |
        | Orchestrator | 8001 | 8000 | Dapr sidecar가 8000 사용하므로 standalone은 8001 |
        | Agent Worker | 8003 | 8001 | 기본 8001이지만 standalone은 충돌 회피 |
        | Dapr Workflow | - | 8002 | Dapr 모드에서만 실행 |
      - 환경 변수 설정: LLM 관련 env var는 IMPORT TIME에 읽히므로 uvicorn 시작 전 필수 설정 (operational_notes 인용)
      - standalone 실행: uvicorn 2개 프로세스
      - Dapr 모드 실행: docker compose up -d
      - shell quoting 주의 (PowerShell)

      ### 9. Testing Strategy
      - E2E 테스트: tests/test_e2e.py, 25개 테스트
      - MockDaprClient로 Dapr/LLM 없이 독립적 실행
      - assert 기반 검증: state 수, transition 수, parallel branch 결과 정확성
      - pre-existing deprecation warning (datetime.utcnow) — 영향 없음

      ## 출력 형식: output_schema 필드에 정의된 JSON 구조를 정확히 따라 반환하세요.

      Rules:
      - ## for top-level sections (1-9), ### for subsections, #### for 4.1-4.4
      - Code blocks MUST have language annotations: ```python, ```yaml, ```bash, ```json
      - Every code block uses EXACT code from ANALYZE_SOURCE.architecture.key_patterns[].code_snippet
      - Tables must be properly formatted Markdown tables
      - Total length: 2000-4000 words
      - Professional technical writing tone
      - Prefer active voice
      - **문서는 한국어로 작성** (예: "Executive Summary" → "1. 요약", "Data Flow" → "데이터 흐름")
      - 섹션 제목은 한국어로 번역하되 영어 원문을 괄호 병기: "1. 요약 (Executive Summary)"
      - 기술 용어(클래스명, 함수명, API 경로, env var 이름)는 원래 영어 표기 유지
      - 코드 블록 내 주석은 한국어로 작성
    inputs: [ANALYZE_SOURCE, RESEARCH_DAPR]
    tools: []
    output_schema:
      type: object
      properties:
        title: {type: string}
        markdown: {type: string}

  # ── Phase 3: 포맷팅 ──
  - id: GENERATE_MD
    type: task
    task: ai_task
    timeout_sec: 120
    description: "완전한 Markdown 문서 포맷팅"
    instruction: >
      You are a documentation formatter. Take the GENERATE_CONTENT markdown content and
      polish it into a professional, self-contained document.

      The document is written in Korean. Preserve ALL technical content — only improve
      formatting, structure, and visual quality.

      ## 포맷팅 프로토콜

      ### Step 1: 표지 생성
      문서 상단에 표지 추가:
      ```markdown
      # POC Agent Platform — Architecture Document
      **버전:** 3.0
      **생성일:** {current date}

      ---
      ```

      ### Step 2: 목차 생성
      문서 내 모든 ## (h2) 섹션 제목을 추출하여 목차 생성:
      ```markdown
      ## 목차 (Table of Contents)
      1. [요약 (Executive Summary)](#1-요약-executive-summary)
      2. [레이어드 아키텍처 (Layered System Architecture)](#2-레이어드-아키텍처-layered-system-architecture)
      ...
      ---
      ```
      - 각 목차 항목은 해당 섹션의 앵커 링크로 연결
      - 섹션이 4.1, 4.2 같은 서브섹션을 가지면 목차에도 들여쓰기로 포함

      ### Step 3: heading 계층 정리
      - # (h1): 표지 제목만
      - ## (h2): 9개 주요 섹션
      - ### (h3): 섹션 내 서브토픽
      - #### (h4): 4.1, 4.2 같은 컴포넌트 서브섹션
      - 일관성 확인: h2 다음 h3, h3 다음 h4 순서 준수

      ### Step 4: 코드 블록 정리
      - 모든 코드 블록에 언어 주석 확인 및 추가 (```python, ```yaml, ```bash, ```json, ```markdown)
      - 코드 블록 내부에 불필요한 줄바꿈 제거
      - 코드 블록 앞뒤로 빈 줄 추가

      ### Step 5: 표 정리
      - 표가 깨졌으면(열 불일치) 수정
      - 표 앞뒤로 빈 줄 추가
      - 표 정렬이 필요한 경우 :---, :---: 사용

      ### Step 6: 문단 간격 정리
      - 연속된 빈 줄 2개 이상 → 1개로 통일
      - 각 섹션 앞뒤로 빈 줄 1개 유지
      - 불릿 포인트 사이 간격 일관성 유지

      ### Step 7: 푸터 추가
      문서 마지막에 추가:
      ```markdown
      ---
      *본 문서는 POC Agent Platform에 의해 자동 생성되었습니다.*
      *생성일: {current date}*
      ```

      Return JSON matching output_schema: title (string), markdown (string), word_count (integer).
    inputs: [GENERATE_CONTENT]
    tools: []
    output_schema:
      type: object
      properties:
        title: {type: string}
        markdown: {type: string}
        word_count: {type: integer}

  # ── Phase 4: 검수 ──
  - id: QUALITY_CHECK
    type: task
    task: ai_task
    timeout_sec: 90
    description: "Markdown 문서 품질 검수 (한글 포함)"
    instruction: >
      You are a strict QA reviewer for technical documentation. Review the GENERATE_MD
      Markdown document against these 5 criteria. Be critical — if something is wrong,
      flag it explicitly.

      ## 평가 기준

      ### 1. Completeness (완전성) — 가중치 20%
      - 모든 9개 섹션이 누락 없이 존재하는가?
        (요약, 레이어드 아키텍처, Dapr Integration, Component Details, 데이터 흐름,
         병렬 실행 모델, Universal AI Worker, 배포 아키텍처, 테스트 전략)
      - 각 섹션이 요구된 구성(도입문단 → 불릿 → 코드 블록 / 표)을 갖추었는가?
      - 4.1~4.4의 4개 서브섹션이 모두 있는가?
      - 목차, 표지, 푸터가 있는가?

      ### 2. Technical Accuracy (기술 정확성) — 가중치 20%
      - 기술 내용이 실제 POC 아키텍처와 일치하는가?
        (예: "standalone 모드는 Dapr 불필요", "ReAct Agent는 LangGraph 사용" 등)
      - 코드 스니펫, 클래스명, API 경로, env var 이름이 정확한가?
        (예: "BizFlowEngine"이 "BizEngine"으로 잘못 쓰이지 않았는가)
      - 수치가 정확한가? (포트 번호, timeout 초, state 수 등)
      - 잘못된 기술 주장이 없는가?

      ### 3. Korean Language Quality (한글 품질) — 가중치 20%
      - 자연스러운 한국어인가? (번역체/직역체 감점: "~합니다"가 일관된가)
      - 맞춤법과 띄어쓰기가 올바른가?
        (주의: "~합니다" 체, "~이다" 체 혼용 금지, "~바와 같이" → "~처럼")
      - 기술 용어(클래스명, API, 툴 이름)는 영어 원문을 유지했는가?
        (예: "워크플로우" 대신 "workflow"는 허용, "비즈플로우엔진" → "BizFlowEngine" 필수)
      - 영어 원문 병기가 자연스러운가? (처음 등장 시에만 병기)

      ### 4. Markdown Quality (마크다운 품질) — 가중치 20%
      - 코드 블록에 언어 주석이 올바른가? (```python, ```yaml, ```bash, ```json)
      - 모든 코드 블록이 열리고 닫혔는가? (``` 개수 일치)
      - 표가 올바른 Markdown 형식인가? (열 구분자 | 정렬, 헤더 분리 행)
      - 목차(TOC) 링크가 정상 동작하는가? (앵커명과 실제 heading 일치)
      - heading 계층이 일관된가? (## → ### → ####, 계층 건너뛰기 없음)
      - 표지, 구분선(---), 푸터가 적절히 배치되었는가?

      ### 5. Readability (가독성) — 가중치 20%
      - 논리적 흐름이 자연스러운가? (섹션 순서가 이해하기 쉬운가)
      - 각 섹션이 독립적으로 읽혀도 이해되는가?
      - 문서 전체 길이가 적절한가? (2000-4000 words)
      - 불릿 포인트가 과도하게 길지 않은가? (각 불릿 1-3문장 권장)
      - 코드 블록이 너무 길어 흐름을 끊지 않는가?

      ## Scoring 방식

      - 각 항목 1-10점 (10 = 완벽, 7 = 합격선, 4 = 대폭 수정 필요, 1 = 거의 없음)
      - overall_score = 평균 (5개 항목 동일 가중치)
      - overall_score >= 7 → verdict = "approved"
      - overall_score < 7 → verdict = "needs_revision"
      - overall_score <= 4 → verdict = "needs_revision" + "critical" 플래그

      ## 출력 형식: output_schema 필드에 정의된 JSON 구조를 정확히 따라 반환하세요.
    inputs: [GENERATE_MD]
    tools: []
    output_schema:
      type: object
      properties:
        scores:
          type: object
          properties:
            completeness: {type: integer}
            accuracy: {type: integer}
            korean_quality: {type: integer}
            markdown_quality: {type: integer}
            readability: {type: integer}
        overall_score: {type: number}
        verdict: {type: string}
        critical: {type: boolean}
        issues: {type: array}
        summary: {type: string}

  - id: END
    type: end

transitions:
  - from: START
    to: RESEARCH_PHASE

  - from: RESEARCH_PHASE
    to: GENERATE_CONTENT
    when: "result.ANALYZE_SOURCE.status == 'OK' and result.RESEARCH_DAPR.status == 'OK'"
  - from: RESEARCH_PHASE
    to: END

  - from: GENERATE_CONTENT
    to: GENERATE_MD
    when: "result.status == 'OK'"
  - from: GENERATE_CONTENT
    to: END

  - from: GENERATE_MD
    to: QUALITY_CHECK
    when: "result.status == 'OK'"
  - from: GENERATE_MD
    to: END

  - from: QUALITY_CHECK
    to: END
    when: "result.status == 'OK' and result.verdict == 'approved'"
  - from: QUALITY_CHECK
    to: GENERATE_CONTENT
    when: "result.status == 'OK' and result.verdict == 'needs_revision'"
  - from: QUALITY_CHECK
    to: END
