workflow_id: poc_doc_generation
version: "4.1"
description: "POC 아키텍처 3분할 분석 + Dapr 조사 (4중 병렬) → Markdown 설계 문서 생성"

input_schema:
  project_root: string
  description: string

states:
  - id: START
    type: start

  # ── Phase 1: 4중 병렬 분석 (3개 소스 분석 + 1개 Dapr 조사) ──
  - id: RESEARCH_PHASE
    type: parallel
    description: "소스코드를 3개 서비스 그룹으로 분할 + Dapr 조사를 병렬로 수행 (read_files 배치 활용)"
    branches:

      # ── Branch A: Orchestrator 분석 ──
      - id: ANALYZE_ORCHESTRATOR
        task: ai_task
        timeout_sec: 900
        description: "Orchestrator 서비스 분석 (소스코드 전용, 배포 설정 제외)"
        instruction: >
          You are a senior software architect analyzing the Orchestrator service of a Python POC project.

          All file tools operate relative to the project root. Use read_files(paths="...") to read
          MULTIPLE files at once (comma-separated, max 5 per call).

          IMPORTANT: Read only orchestrator/ source code. Do NOT read YAML, docker-compose, or
          non-Python files — those are handled by other analysis branches.


          ## Step 1: Service layout

          list_directory("orchestrator")


          ## Step 2: Bulk extraction via grep (2 calls, not 3)

          Call 1 — grep("^class |^def |^async def", path="orchestrator")
          Call 2 — grep("os\\.getenv", path="orchestrator")


          ## Step 3: Batch read via read_files (2 calls, 5 files only)

          Call A — read_files(paths="orchestrator/main.py, orchestrator/engine.py")
          Call B — read_files(paths="orchestrator/dapr_client.py, orchestrator/payload_builder.py, orchestrator/instance.py")

          For each file, focus on class/function bodies, API routes, design patterns.
          Do NOT summarize every detail — extract the key architecture patterns only.


          ## OUTPUT: output_schema에 정의된 JSON 구조로 반환.

        inputs: [_input]
        tools: [read_file, read_files, glob, grep, list_directory]
        output_schema:
          type: object
          properties:
            service_overview: {type: object}
            key_classes: {type: array}
            api_routes: {type: array}
            env_vars: {type: object}
            design_patterns: {type: object}

      # ── Branch B: Agent Worker 분석 ──
      - id: ANALYZE_WORKER
        task: ai_task
        timeout_sec: 900
        description: "Agent Worker + LangGraph Agent + Tools 분석"
        instruction: >
          You are a senior software architect analyzing the Agent Worker service of a Python POC project.

          All file tools operate relative to the project root. Use read_files(paths="...") to read
          MULTIPLE files at once (comma-separated, max 6 per call).


          ## Step 1: Service layout

          list_directory("agent_worker")
          list_directory("agent_worker/universal")


          ## Step 2: Bulk extraction via grep (2 calls)

          Call 1 — grep("^class |^def |^async def", path="agent_worker")
          Call 2 — grep("os\\.getenv", path="agent_worker")


          ## Step 3: Batch read via read_files (1 call)

          Call A — read_files(paths="agent_worker/main.py, agent_worker/universal/handler.py, agent_worker/universal/langgraph_agent.py, agent_worker/universal/tools.py")

          For each file, focus on: tool registration, LangGraph config, LLM settings, error handling.


          ## OUTPUT: output_schema에 정의된 JSON 구조로 반환.

        inputs: [_input]
        tools: [read_file, read_files, glob, grep, list_directory]
        output_schema:
          type: object
          properties:
            service_overview: {type: object}
            langgraph_config: {type: object}
            tool_registry: {type: object}
            llm_settings: {type: object}
            env_vars: {type: object}

      # ── Branch C: Shared + DaprWorkflow 분석 ──
      - id: ANALYZE_SHARED
        task: ai_task
        timeout_sec: 900
        description: "Shared Library + DaprWorkflow Service 분석"
        instruction: >
          You are a senior software architect analyzing the Shared library and DaprWorkflow service of a Python POC project.

          All file tools operate relative to the project root. Use read_files(paths="...") to read
          MULTIPLE files at once (comma-separated, max 6 per call).


          ## Step 1: Service layout

          list_directory("shared")
          list_directory("dapr_workflow")


          ## Step 2: Bulk extraction via grep (2 calls)

          Call 1 — grep("^class |^def |^async def", path="shared")
          Call 2 — grep("^class |^def |^async def", path="dapr_workflow")


          ## Step 3: Batch read via read_files (2 calls)

          Call A — read_files(paths="shared/models.py, shared/workflow_repository.py, shared/orm_models.py, shared/workflow_loader.py, shared/db.py")
          Call B — read_files(paths="dapr_workflow/main.py, dapr_workflow/workflows.py, dapr_workflow/activities.py, dapr_workflow/result_bridge.py")

          For each file, focus on: class hierarchy, DB schema, workflow engine, result bridge.


          ## OUTPUT: output_schema에 정의된 JSON 구조로 반환.

        inputs: [_input]
        tools: [read_file, read_files, glob, grep, list_directory]
        output_schema:
          type: object
          properties:
            shared_library: {type: object}
            db_schema: {type: object}
            workflow_engine: {type: object}
            dapr_workflow_service: {type: object}
            result_bridge: {type: object}

      # ── Branch D: Dapr 기술 조사 (기존 유지) ──
      - id: RESEARCH_DAPR
        task: ai_task
        timeout_sec: 1800
        description: "Dapr 기술 개념 공식 문서 조사"
        instruction: >
          You are a Dapr technology specialist researching Dapr for an AI Agent orchestration POC.


          ## IMPORTANT: Dapr Documentation URL Patterns

          Use ONLY these verified URLs for web_fetch:

          - Overview: https://docs.dapr.io/concepts/
          - Dapr overview: https://docs.dapr.io/concepts/overview/
          - Workflow docs: https://docs.dapr.io/developing-applications/building-blocks/workflow/
          - Workflow overview: https://docs.dapr.io/developing-applications/building-blocks/workflow/workflow-overview/
          - How to author: https://docs.dapr.io/developing-applications/building-blocks/workflow/howto-author-workflow/
          - Workflow patterns: https://docs.dapr.io/developing-applications/building-blocks/workflow/workflow-patterns/
          - Pub/sub docs: https://docs.dapr.io/developing-applications/building-blocks/pubsub/
          - How to pub/sub: https://docs.dapr.io/developing-applications/building-blocks/pubsub/howto-publish-subscribe/


          ## Phase 1: Dapr 기본 개념 조사 (web_search)

          web_search("Dapr distributed application runtime building blocks overview")

          찾을 내용: Dapr이 무엇인지, building blocks, sidecar 아키텍처, 장점


          ## Phase 2: 핵심 주제 심층 조사 (3 topics, each 1 search + 1 fetch)

          Topic 1: Dapr Workflow SDK
          검색어: "Dapr Workflow SDK when_all parallel execution task orchestration"
          확인: when_all(), register_workflow, workflow polling, DirectAgentClient vs DaprWorkflowClient

          Topic 2: Dapr pub/sub
          검색어: "Dapr pub/sub programmatic subscription HTTP API CloudEvents"
          확인: programmatic subscription, CloudEvents, topic 발행, agent_worker 구독

          Topic 3: Dapr sidecar + component configuration
          검색어: "Dapr sidecar HTTP API workflow component YAML"
          확인: sidecar 패턴, 포트, component YAML, docker-compose 구성


          ## OUTPUT: output_schema 필드에 정의된 JSON 구조를 정확히 따라 반환하세요.

        inputs: [_input]
        tools: [web_search, web_fetch]
        output_schema:
          type: object
          properties:
            overview: {type: object}
            topics: {type: array}
            deployment: {type: object}
            execution_mode_comparison: {type: object}
            summary: {type: string}
            all_references: {type: array}

  # ── Phase 2: 개요 + 아키텍처 문서 생성 ──
  - id: GENERATE_OVERVIEW
    type: task
    task: ai_task
    timeout_sec: 300
    description: "Executive Summary + Layered Architecture + Dapr Integration 섹션 작성"
    instruction: >
      당신은 시니어 기술 문서 작성자입니다. comprehensive architecture document의
      앞부분 3개 섹션을 한국어로 작성해 주세요.

      payload["ANALYZE_ORCHESTRATOR"]에는 orchestrator 서비스 분석 결과가,
      payload["ANALYZE_WORKER"]에는 agent_worker 서비스 분석 결과가,
      payload["ANALYZE_SHARED"]에는 shared + dapr_workflow 분석 결과가,
      payload["RESEARCH_DAPR"]에는 Dapr 기술 조사 결과가 포함되어 있습니다.


      ## 입력 데이터 구조

      payload["ANALYZE_ORCHESTRATOR"]:
        service_overview: {Orchestrator 서비스 목적과 범위}
        key_classes: [{name, signature, purpose}]
        api_routes: [{method, path, handler, purpose}]
        env_vars: [{name, default, read_at, effect}]
        design_patterns: {state_machine, parallel_branches, transition_evaluator}

      payload["ANALYZE_WORKER"]:
        service_overview: {Worker 서비스 구조}
        langgraph_config: {create_react_agent, model, tools, graph_cache}
        tool_registry: {TOOL_DEFINITIONS, register_tool, execute_tool}
        llm_settings: {model, timeout, retries, mock_fallback}
        env_vars: {AGENT_TIMEOUT, LLM_TIMEOUT, LLM_MODEL 등}

      payload["ANALYZE_SHARED"]:
        shared_library: {models, workflow_repository, orm_models, workflow_loader}
        db_schema: {tables for workflows, instances, step_results}
        workflow_engine: {BizFlowEngine, TransitionEvaluator}
        dapr_workflow_service: {main entry, workflow registration, activities}
        result_bridge: {result_bridge.py, raiseEvent, retry logic}

      payload["RESEARCH_DAPR"]:
        overview: {what_is_dapr, building_blocks, sidecar_architecture}
        topics: [{name, official_description, api_details, poc_integration, best_practices}]
        deployment: {dapr_components with yaml_example, ports}
        execution_mode_comparison: {standalone vs dapr}


      ## 작성할 섹션

      ### 1. 요약 (Executive Summary)
      - payload._input.description 활용 (POC 목적과 범위)
      - 핵심 아키텍처 결정사항: State Machine 엔진, LangGraph ReAct Agent, Dapr 선택적 통합
      - 기술 스택: dependencies 프레임워크, DB, LLM
      - 실행 모드: standalone(기본) + Dapr(선택)

      ### 2. 레이어드 아키텍처 (Layered System Architecture)
      - 4개 서비스를 레이어로 매핑: Orchestrator(L1~L2) → Worker(L3) → Dapr(L3~L4)
      - 각 레이어 상세 설명
      - 레이어 간 데이터 흐름

      ### 3. Dapr Integration
      - Dapr 개념 소개 (sidecar 아키텍처, building blocks)
      - Dapr Workflow SDK + pub/sub 집중 설명
      - 실행 모드 비교 표: | 항목 | Standalone | Dapr |
      - YAML 코드 블록 예시


      ## 작성 규칙
      - ## for sections, ### for subsections
      - 코드 블록은 언어 주석 필수 (```python, ```yaml, ```bash, ```json)
      - 표는 올바른 Markdown 형식
      - total: 800-1500 words
      - 한국어 작성, 기술 용어는 영어 유지
      - 처음 등장하는 용어만 영어 원문 병기

      Return JSON matching output_schema.
    inputs: [ANALYZE_ORCHESTRATOR, ANALYZE_WORKER, ANALYZE_SHARED, RESEARCH_DAPR]
    tools: []
    output_schema:
      type: object
      properties:
        section_1_summary: {type: string}
        section_2_architecture: {type: string}
        section_3_dapr: {type: string}

  # ── Phase 3: 상세 섹션 문서 생성 ──
  - id: GENERATE_DETAILS
    type: task
    task: ai_task
    timeout_sec: 600
    max_tokens: 8192
    description: "Component Details + Data Flow + Worker + Deployment + Testing 섹션 작성"
    instruction: >
      당신은 시니어 기술 문서 작성자입니다. comprehensive architecture document의
      뒷부분 5개 섹션을 한국어로 작성해 주세요.

      payload["ANALYZE_ORCHESTRATOR"], payload["ANALYZE_WORKER"],
      payload["ANALYZE_SHARED"], payload["RESEARCH_DAPR"]에 분석 결과가 포함되어 있습니다.
      payload["GENERATE_OVERVIEW"]에는 앞서 작성된 섹션 1-3의 내용이 포함되어 있습니다.


      ## 입력 데이터 구조

      payload["ANALYZE_ORCHESTRATOR"]:
        service_overview, key_classes, api_routes, env_vars, design_patterns

      payload["ANALYZE_WORKER"]:
        service_overview, langgraph_config, tool_registry, llm_settings, env_vars

      payload["ANALYZE_SHARED"]:
        shared_library, db_schema, workflow_engine, dapr_workflow_service, result_bridge


      ## 작성할 섹션 (payload["GENERATE_OVERVIEW"] 참조하여 내용 연결)

      ### 4. 컴포넌트 상세 (Component Details)
      4개의 서비스 각각 서브섹션 (#### 4.1 ~ 4.4):
      - Orchestrator: 목적, key_classes 표, api_routes 표, env_vars 표, design_patterns
      - Agent Worker: 목적, LangGraph 설정, tool_registry, LLM 설정
      - Shared Library: models, DB schema, workflow_engine
      - Dapr Workflow: main, activities, result_bridge, workflow registration

      ### 5. 데이터 흐름 (Data Flow)
      - 전체 경로: "API call → engine.run() → PayloadBuilder.build() → dapr.execute_task() → agent_worker → LangGraph run_agent() → result 저장 → DB"
      - 각 단계 데이터 변환 설명
      - state machine loop: MAX_STEPS=50 안전장치, transition condition 평가
      - 관련 코드 스니펫 포함

      ### 6. 병렬 실행 모델 (Parallel Execution Model)
      - RESEARCH_PHASE: 4개 브랜치 병렬 (ANALYZE_ORCHESTRATOR, ANALYZE_WORKER, ANALYZE_SHARED, RESEARCH_DAPR)
      - transition condition: 4개 브랜치 모두 OK
      - standalone: 순차 실행, Dapr: when_all 진정한 병렬
      - payload assembly: GENERATE_OVERVIEW가 4개 결과를 병합

      ### 7. Universal AI Worker
      - LangGraph create_react_agent (코드 스니펫)
      - tool registration 4단계 파이프라인
      - tool whitelist: inputs.tools 배열로 LLM 노출 제어
      - read_files 배치 툴 (여러 파일 한번에 읽기)
      - mock fallback: OPENAI_API_KEY 없으면 mock 반환
      - Cloudflare 524 재시도 로직

      ### 8. 배포 아키텍처 (Deployment Architecture)
      - 포트 할당표
      - 환경 변수 설정 (import time에 읽힘)
      - standalone 실행: uvicorn 2개 프로세스
      - Dapr 실행: docker compose up -d

      ### 9. 테스트 전략 (Testing Strategy)
      - E2E 테스트: tests/test_e2e.py
      - MockDaprClient로 Dapr/LLM 없이 독립적 실행
      - assert 기반 검증


      ## 작성 규칙
      - ## for sections, ### for subsections, #### for 4.1-4.4
      - 코드 블록은 언어 주석 필수
      - 표는 올바른 Markdown 형식
      - total: 1200-2500 words
      - payload["GENERATE_OVERVIEW"] 내용과 자연스럽게 연결
      - 한국어 작성, 기술 용어는 영어 유지

      Return JSON matching output_schema.
    inputs: [ANALYZE_ORCHESTRATOR, ANALYZE_WORKER, ANALYZE_SHARED, RESEARCH_DAPR, GENERATE_OVERVIEW]
    tools: []
    output_schema:
      type: object
      properties:
        section_4_components: {type: string}
        section_5_dataflow: {type: string}
        section_6_parallel: {type: string}
        section_7_worker: {type: string}
        section_8_deployment: {type: string}
        section_9_testing: {type: string}

  # ── Phase 4: 통합 Markdown 문서 포맷팅 ──
  - id: GENERATE_MD
    type: task
    task: ai_task
    timeout_sec: 600
    max_tokens: 8192
    description: "전체 섹션 취합 → 완전한 Markdown 문서 포맷팅"
    instruction: >
      You are a documentation formatter. Assemble all sections from GENERATE_OVERVIEW and
      GENERATE_DETAILS into a single, professional Markdown document.

      payload["GENERATE_OVERVIEW"] contains .section_1_summary, .section_2_architecture, .section_3_dapr.
      payload["GENERATE_DETAILS"] contains .section_4_components through .section_9_testing.

      ## 포맷팅 프로토콜

      ### Step 1: Cover page
      ```markdown
      # POC Agent Platform — Architecture Document
      **버전:** 4.1
      **생성일:** {current date}
      ---
      ```

      ### Step 2: Table of Contents
      Extract all ## (h2) headings, generate TOC with anchor links.

      ### Step 3: Assemble sections in order
      1. payload.Generate_OVERVIEW.section_1_summary
      2. payload.GENERATE_OVERVIEW.section_2_architecture
      3. payload.GENERATE_OVERVIEW.section_3_dapr
      4. payload.GENERATE_DETAILS.section_4_components
      5. payload.GENERATE_DETAILS.section_5_dataflow
      6. payload.GENERATE_DETAILS.section_6_parallel
      7. payload.GENERATE_DETAILS.section_7_worker
      8. payload.GENERATE_DETAILS.section_8_deployment
      9. payload.GENERATE_DETAILS.section_9_testing

      ### Step 4: Clean up
      - Fix heading hierarchy (## → ### → ####)
      - Ensure code blocks have language annotations
      - Fix broken tables
      - Remove consecutive blank lines (2+ → 1)
      - Make sections flow naturally (remove duplicate introductions)

      ### Step 5: Footer
      ---
      *본 문서는 POC Agent Platform에 의해 자동 생성되었습니다.*
      *버전: 4.1*

      Return JSON matching output_schema.
    inputs: [GENERATE_OVERVIEW, GENERATE_DETAILS]
    tools: []
    output_schema:
      type: object
      properties:
        title: {type: string}
        markdown: {type: string}
        word_count: {type: integer}

  # ── Phase 5: 검수 ──
  - id: QUALITY_CHECK
    type: task
    task: ai_task
    timeout_sec: 90
    description: "Markdown 문서 품질 검수 (한글 포함)"
    instruction: >
      You are a strict QA reviewer for technical documentation. Review the GENERATE_MD
      Markdown document against these 5 criteria. Be critical.

      ## Evaluation Criteria

      1. Completeness (20%): All 9 sections present? Table of contents, cover, footer?
      2. Technical Accuracy (20%): Class names, API paths, env vars, port numbers correct?
      3. Korean Quality (20%): Natural Korean? Consistent formality (~합니다 체)? Technical terms in English?
      4. Markdown Quality (20%): Code block language annotations, tables, heading hierarchy?
      5. Readability (20%): Logical flow, 2000-4000 words total?

      ## Scoring
      - completeness: 1-10 (10=perfect, 7=passing)
      - accuracy: 1-10
      - korean_quality: 1-10
      - markdown_quality: 1-10
      - readability: 1-10
      - overall_score = average of all 5
      - decision: EXACTLY "approved" (overall_score >= 7) or "needs_revision" (overall_score < 7)

      ## CRITICAL: Return EXACTLY this JSON structure — field names must match precisely
      ```json
      {
        "scores": {
          "completeness": 8,
          "accuracy": 9,
          "korean_quality": 7,
          "markdown_quality": 8,
          "readability": 7
        },
        "overall_score": 7.8,
        "decision": "approved",
        "feedback": "brief review notes"
      }
      ```

      The field name is "decision", NOT "verdict". Use "approved" or "needs_revision".
      The field name is "scores.completeness", NOT "completeness_score".

      Return JSON matching this structure exactly.
    inputs: [GENERATE_MD]
    tools: []
    output_schema:
      type: object
      properties:
        scores:
          type: object
          properties:
            completeness: {type: integer}
            accuracy: {type: integer}
            korean_quality: {type: integer}
            markdown_quality: {type: integer}
            readability: {type: integer}
        overall_score: {type: number}
        decision: {type: string}
        feedback: {type: string}

  - id: END
    type: end

transitions:
  - from: START
    to: RESEARCH_PHASE

  - from: RESEARCH_PHASE
    to: GENERATE_OVERVIEW
    when: "result.ANALYZE_ORCHESTRATOR.status == 'OK' and result.ANALYZE_WORKER.status == 'OK' and result.ANALYZE_SHARED.status == 'OK' and result.RESEARCH_DAPR.status == 'OK'"
  - from: RESEARCH_PHASE
    to: END

  - from: GENERATE_OVERVIEW
    to: GENERATE_DETAILS
    when: "result.status == 'OK'"
  - from: GENERATE_OVERVIEW
    to: END

  - from: GENERATE_DETAILS
    to: GENERATE_MD
    when: "result.status == 'OK'"
  - from: GENERATE_DETAILS
    to: END

  - from: GENERATE_MD
    to: QUALITY_CHECK
    when: "result.status == 'OK'"
  - from: GENERATE_MD
    to: END

  - from: QUALITY_CHECK
    to: END
    when: "result.status == 'OK'"
  - from: QUALITY_CHECK
    to: END
